<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Contagem</title>
</head>
<body>

<h1 id="contador">Carregando...</h1>

<script>

const url = "https://script.google.com/macros/s/AKfycbz9a-VMBBfqwLyQn9GhjtsEOJ6CD2NRdHS0UvsZkhaE8VWwPcTQgohlDkNvjP-E6cgf/exec";

fetch(url)
.then(r => r.json())
.then(data => {

const prova = new Date(data.prova);

function atualizar(){

let agora = new Date();
let diff = prova - agora;

let dias = Math.floor(diff/(1000*60*60*24));
let horas = Math.floor((diff/(1000*60*60))%24);
let minutos = Math.floor((diff/(1000*60))%60);
let segundos = Math.floor((diff/1000)%60);

document.getElementById("contador").innerHTML =
dias+" dias "+horas+"h "+minutos+"m "+segundos+"s";

}

atualizar();
setInterval(atualizar,1000);

});

</script>

</body>
</html>
